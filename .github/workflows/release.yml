name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build engine + GUI + ZIP portable + Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate release tag
        shell: powershell
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if ($env:REF_NAME -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z\.-]+)?$') {
            Write-Error "Invalid release tag '$($env:REF_NAME)' - expected semver like v1.2.3 or v1.2.3-rc1"
            exit 1
          }

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.26'
          cache: true

      - name: Install Wails CLI v2.12.0
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build harden-engine.exe
        # -trimpath retire le path absolu du runner (D:\a\...) du binaire,
        # défense en profondeur pour ne rien fuiter de l'env de build.
        shell: powershell
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          go build -trimpath -ldflags "-X main.Version=$env:VERSION" -o dist/harden-engine.exe ./cmd/harden-engine

      - name: Build harden-gui.exe (Wails)
        working-directory: cmd/harden-gui
        run: wails build -trimpath

      - name: Smoke test
        run: |
          .\dist\harden-engine.exe version
          .\dist\harden-engine.exe validate
          .\dist\harden-engine.exe coverage

      - name: Generate portable ZIP
        shell: powershell
        env:
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $version = $env:REF_NAME.TrimStart('v')
          $repository = $env:REPOSITORY
          $releaseName = "Harden-Win11-$version"
          $stagingDir = "build\$releaseName"
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

          Copy-Item dist\harden-engine.exe $stagingDir
          Copy-Item cmd\harden-gui\build\bin\harden-gui.exe $stagingDir
          Copy-Item manifests $stagingDir -Recurse
          Copy-Item engine $stagingDir -Recurse -Exclude '*.tests.ps1'
          Copy-Item schemas $stagingDir -Recurse
          Copy-Item mappings $stagingDir -Recurse

          $launcher = @'
          @echo off
          NET SESSION >nul 2>&1
          IF %errorlevel% EQU 0 (
              start "" "%~dp0harden-gui.exe"
          ) ELSE (
              powershell -Command "Start-Process -FilePath '%~dp0harden-gui.exe' -Verb RunAs"
          )
          '@
          Set-Content -Path "$stagingDir\run-as-admin.bat" -Value $launcher -Encoding ASCII

          $readme = @"
          # Harden-Win11 $version (portable)

          ## Lancer
          Double-clic sur **run-as-admin.bat** — la GUI démarre avec UAC.

          ## Pas d'installation
          Aucune entrée registre, aucun service. Pour désinstaller : supprime ce dossier.

          ## Vérifier l'intégrité
          ``Get-FileHash -Algorithm SHA256 Harden-Win11-$version.zip``
          Compare avec le fichier .sha256 publié sur la page Release.

          Vérifier la provenance SLSA :
          ``gh attestation verify Harden-Win11-$version.zip --repo $repository``

          Documentation complète : https://github.com/$repository
          "@
          Set-Content -Path "$stagingDir\README.txt" -Value $readme -Encoding UTF8

          $zipPath = "build\$releaseName.zip"
          Compress-Archive -Path "$stagingDir\*" -DestinationPath $zipPath -CompressionLevel Optimal

          $hashZip = (Get-FileHash $zipPath -Algorithm SHA256).Hash
          "$hashZip  $releaseName.zip" | Out-File -Encoding ascii "$zipPath.sha256"

          $hashEngine = (Get-FileHash dist/harden-engine.exe -Algorithm SHA256).Hash
          "$hashEngine  harden-engine.exe" | Out-File -Encoding ascii dist/harden-engine.exe.sha256

          $hashGui = (Get-FileHash cmd/harden-gui/build/bin/harden-gui.exe -Algorithm SHA256).Hash
          "$hashGui  harden-gui.exe" | Out-File -Encoding ascii cmd/harden-gui/build/bin/harden-gui.exe.sha256

      - name: Attest build provenance (SLSA L2)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            build/Harden-Win11-*.zip
            dist/harden-engine.exe
            cmd/harden-gui/build/bin/harden-gui.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@62c96d0c4e8a889135c1f3a25910db8dbe0e85f7 # v2.3.4
        with:
          name: ${{ github.ref_name }}
          body: |
            ## 📥 Téléchargement

            **Recommandé — version portable (GUI + CLI + manifests)** :
            👉 `Harden-Win11-X.Y.Z.zip` ci-dessous. Décompresse, double-clic sur `run-as-admin.bat`.

            **CLI seule** :
            `harden-engine.exe` pour scripting / CI.

            ## ✅ Vérifier l'intégrité

            ```powershell
            Get-FileHash -Algorithm SHA256 Harden-Win11-X.Y.Z.zip
            ```

            Compare avec le `.sha256` à côté du ZIP.

            ## 🔒 Vérifier la provenance SLSA

            ```powershell
            gh attestation verify Harden-Win11-X.Y.Z.zip --repo ${{ github.repository }}
            ```

            ## 📝 Changelog

            Voir les commits depuis la dernière release ci-dessous.
          files: |
            build/Harden-Win11-*.zip
            build/Harden-Win11-*.zip.sha256
            dist/harden-engine.exe
            dist/harden-engine.exe.sha256
            cmd/harden-gui/build/bin/harden-gui.exe
            cmd/harden-gui/build/bin/harden-gui.exe.sha256
          generate_release_notes: true
          fail_on_unmatched_files: false
