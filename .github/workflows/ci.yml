name: CI

on:
  push:
    branches: [main, v2-walking-skeleton]
  pull_request:
    branches: [main]

jobs:
  go-build-test:
    name: Go build + tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build -trimpath -o dist/harden-engine.exe ./cmd/harden-engine

      - name: go test (avec coverage)
        # -race nécessite cgo + gcc. On ne l'active pas par défaut sur le runner
        # Windows (pas de gcc préinstallé). Pour ré-activer : ajouter setup-mingw.
        # Coverage limitée au code business (pkg + engine CLI). Les `tools/`
        # et `cmd/harden-gui` (Wails — pas de tests Go) sont tirés du calcul.
        run: go test ./pkg/... ./cmd/harden-engine/... -count=1 -timeout 10m -coverprofile=coverage.out

      - name: Coverage report
        run: go tool cover -func=coverage.out | tail -1

      - name: Coverage threshold (≥ 25% sur pkg + engine CLI)
        shell: powershell
        run: |
          $line = (go tool cover -func=coverage.out | Select-Object -Last 1).ToString()
          if ($line -match '(\d+\.\d+)%') {
              $pct = [double]$matches[1]
              Write-Host "Total coverage: $pct%"
              if ($pct -lt 25.0) {
                  Write-Error "Coverage $pct% below threshold 25%"
                  exit 1
              }
          }

      - name: Smoke test (version + validate + coverage + dry-run)
        run: |
          .\dist\harden-engine.exe version
          .\dist\harden-engine.exe validate
          .\dist\harden-engine.exe coverage
          .\dist\harden-engine.exe apply --dry-run --section accounts

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: harden-engine-windows-amd64
          path: dist/harden-engine.exe
          retention-days: 30

  pester:
    name: Pester (PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester 5
        shell: powershell
        run: |
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -SkipPublisherCheck -Scope CurrentUser
          Get-Module -ListAvailable Pester | Where-Object { $_.Version.Major -ge 5 } | Format-Table

      - name: Run Pester
        shell: powershell
        run: |
          Import-Module Pester -MinimumVersion 5.0 -Force
          $config = New-PesterConfiguration
          $config.Run.Path = 'engine/actions'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.TestResult.OutputPath = 'pester-results.xml'
          Invoke-Pester -Configuration $config

      - name: Upload Pester results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: pester-results.xml
          retention-days: 30

  audit-coherence:
    name: Manifest static audit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run audit-coherence
        shell: powershell
        run: |
          .\tools\audit-coherence.ps1
          if ($LASTEXITCODE -ne 0) {
              Write-Error "audit-coherence: exit $LASTEXITCODE — voir output ci-dessus"
              exit $LASTEXITCODE
          }

  build-gui:
    name: Build GUI (Wails)
    runs-on: windows-latest
    needs: go-build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Frontend syntax check
        shell: powershell
        run: |
          node --check cmd/harden-gui/frontend/app.js
          if ($LASTEXITCODE -ne 0) { Write-Error "app.js syntax error"; exit 1 }
          node --check cmd/harden-gui/frontend/i18n.js
          if ($LASTEXITCODE -ne 0) { Write-Error "i18n.js syntax error"; exit 1 }
      - name: i18n unit tests
        run: node cmd/harden-gui/frontend/i18n.test.js
      - name: Install Wails CLI v2.12.0
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Build GUI
        working-directory: cmd/harden-gui
        run: wails build
      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: harden-gui-windows-amd64
          path: cmd/harden-gui/build/bin/harden-gui.exe
          retention-days: 30

  gosec:
    name: Security scan (gosec)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      # G301/G302/G306 : noise sur Windows (perms POSIX ignorées par l'OS).
      # G204/G304 : design intentionnel (on spawn des PS scripts validés via JSONSchema).
      # On garde les autres rules pour détecter les vraies vulnérabilités.
      - name: Run gosec
        shell: powershell
        run: |
          $gosec = "$(go env GOPATH)\bin\gosec.exe"
          # --% : stop-parsing token. Sans ça, PowerShell interprete -fmt comme un parametre PS.
          & $gosec --% -fmt=text -quiet -exclude=G204,G301,G302,G304,G306 ./pkg/... ./cmd/harden-engine/...

  mutation:
    name: Mutation testing (gremlins, maturity package)
    runs-on: windows-latest
    needs: go-build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest
      # Mutation testing : modifie le source (ex: > devient <), relance les tests,
      # vérifie que le test échoue. Si pas → bug latent dans la suite de tests.
      # On le fait sur les packages business logic qui ont >90% coverage : maturity, baseline.
      - name: Run mutation testing
        shell: powershell
        continue-on-error: true   # gremlins peut être lent — n'échoue pas le build
        run: |
          $g = "$(go env GOPATH)\bin\gremlins.exe"
          & $g unleash --threshold-efficacy=70 ./pkg/engine/maturity/
          & $g unleash --threshold-efficacy=70 ./pkg/engine/baseline/

  fuzz:
    name: Fuzz parsers (smoke 30s each)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Fuzz manifest loader
        run: go test -fuzz=FuzzLoad -fuzztime=30s ./pkg/engine/manifest/
      - name: Fuzz journal NDJSON reader
        run: go test -fuzz=FuzzReadRun -fuzztime=30s ./pkg/engine/journal/
      - name: Fuzz baseline loader
        run: go test -fuzz=FuzzLoad -fuzztime=30s ./pkg/engine/baseline/

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          # v8 de l'action supporte golangci-lint v2 (config en version: "2").
          # --timeout est défini dans .golangci.yml (run.timeout).

  # Linux compile-only check : confirme que les build tags Windows-only
  # n'empêchent pas la compilation sur Linux (utile pour les contributors
  # qui dev sur Linux/macOS et veulent au moins voir compiler).
  go-cross-compile:
    name: Go cross-compile sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: GOOS=windows go build (cmd + pkg)
        run: GOOS=windows go build ./cmd/... ./pkg/...

      - name: GOOS=linux go build (vérifie les build tags _other.go)
        run: GOOS=linux go build ./cmd/... ./pkg/...
