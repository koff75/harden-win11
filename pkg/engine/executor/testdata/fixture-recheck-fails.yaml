version: "1.0"

section:
  id: fixture_recheck_fails
  order: 99
  title: "Fixture — action ok=true mais re-test reste non-compliant (action menteuse)"
  description: "Couvre le cas où l'action retourne ok=true sans changer l'état observable. Le re-test doit déclencher un rollback."

rules:
  - id: fixture.lying_action
    title: "Lying action that pretends to succeed"
    description: "."
    explanation: "."
    severity: nice-to-have
    impact: "."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    action: ./pkg/engine/executor/testdata/success.action.ps1
    test: ./pkg/engine/executor/testdata/never_compliant.test.ps1
    undo: ./pkg/engine/executor/testdata/noop.undo.ps1
