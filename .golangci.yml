# golangci-lint config — version 2.
version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - gosec
    - unconvert
  # misspell désactivé : faux positifs sur les commentaires français.
  # revive désactivé : trop strict (unused-parameter, exported-comments)
  # pour un projet en phase initiale — à réactiver progressivement quand
  # le code aura été nettoyé.
  exclusions:
    # Les outils one-shot dans tools/ sont des scripts utilitaires (annotate-*, fix-mojibake, audit-i18n).
    # Pas de tests, pas de garanties prod, pas la peine de les tenir aux mêmes standards que pkg/.
    paths:
      - tools/.*
    rules:
      # Tests : ignorer errcheck/gosec — beaucoup d'appels best-effort dans les fixtures.
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      # journal : _ = explicite (best-effort logging).
      - text: 'Error return value of `.*Emit` is not checked'
        linters:
          - errcheck
      # Pattern defer X.Close() : très courant, acceptable. Une erreur de close
      # sur un fichier déjà lu n'a pas d'action utile à prendre.
      - text: 'Error return value of `.*\.Close` is not checked'
        linters:
          - errcheck
      # filepath.WalkDir : err déjà vérifié par le callback interne.
      - text: 'Error return value of `filepath\.WalkDir` is not checked'
        linters:
          - errcheck
      # os.Remove dans defer pour cleanup tmp file : best-effort, OK.
      - text: 'Error return value of `os\.Remove` is not checked'
        linters:
          - errcheck
      # gosec G204 : spawn PowerShell — design intentionnel du projet (toute l'archi
      # repose sur l'exécution de scripts PS validés via JSONSchema avant exécution).
      - text: 'G204:'
        linters:
          - gosec
      # gosec G301 : 0o755 directory perms — Windows ignore les POSIX perms,
      # ce code tourne uniquement sur Windows.
      - text: 'G301:'
        linters:
          - gosec
      # gosec G304 : file inclusion via variable — les paths sont validés en amont
      # (manifests YAML chargés depuis répertoire approuvé).
      - text: 'G304:'
        linters:
          - gosec
      # gosec G302/G306 : POSIX file permissions — Windows ignore (NTFS ACL).
      # Le projet ne tourne que sous Windows, ces alertes sont du bruit.
      - text: 'G302:'
        linters:
          - gosec
      - text: 'G306:'
        linters:
          - gosec
