version: "1.0"

section:
  id: defender
  order: 1
  title: "Microsoft Defender"
  description: "Antivirus intégré à Windows. On active toutes ses protections."

rules:
  - id: defender.realtime
    title: "Protection temps réel"
    description: "Scanner les fichiers à chaque ouverture / téléchargement."
    explanation: |
      Defender scanne en arrière-plan chaque fichier que tu ouvres.
      Sans ça, un malware peut s'exécuter sans alerte.
    severity: critical
    impact: "Aucun. Activé par défaut sur Win11."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/microsoft-365/security/defender-endpoint/configure-real-time-protection-microsoft-defender-antivirus"
    tags: [malware, defender]
    added_in: "1.0"
    action: ./engine/actions/defender/realtime.action.ps1
    test: ./engine/actions/defender/realtime.test.ps1
    undo: ./engine/actions/defender/realtime.undo.ps1

  - id: defender.behavior_monitoring
    title: "Behavior Monitoring"
    description: "Analyse comportementale des processus en cours d'exécution."
    explanation: |
      Defender surveille le comportement des processus (création de fichiers,
      injection de code, persistance) pour détecter les malwares qui
      contourneraient l'analyse statique. Crucial contre les attaques
      fileless.
    severity: critical
    impact: "Aucun. Activé par défaut sur Win11."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/powershell/module/defender/set-mppreference"
    tags: [malware, defender]
    added_in: "1.0"
    action: ./engine/actions/defender/behavior_monitoring.action.ps1
    test: ./engine/actions/defender/behavior_monitoring.test.ps1
    undo: ./engine/actions/defender/behavior_monitoring.undo.ps1

  - id: defender.ioav
    title: "IOAV (analyse pièces jointes / téléchargements)"
    description: "Analyse les fichiers téléchargés et pièces jointes Office."
    explanation: |
      IOAV (IOfficeAntiVirus) intercepte les fichiers téléchargés via Outlook,
      navigateur, ou ouverts dans Office avant exécution. Bloque les pièces
      jointes vérolées et les payloads téléchargés.
    severity: critical
    impact: "Aucun. Activé par défaut sur Win11."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/powershell/module/defender/set-mppreference"
    tags: [malware, defender, email]
    added_in: "1.0"
    action: ./engine/actions/defender/ioav.action.ps1
    test: ./engine/actions/defender/ioav.test.ps1
    undo: ./engine/actions/defender/ioav.undo.ps1

  - id: defender.script_scanning
    title: "Script scanning"
    description: "Analyse des scripts PowerShell, JS, VBS avant exécution."
    explanation: |
      Defender scanne le contenu des scripts (PowerShell, JScript, VBScript)
      au moment de leur exécution. Bloque les attaques fileless qui
      n'écrivent pas de binaire sur disque.
    severity: critical
    impact: "Aucun. Activé par défaut sur Win11."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/powershell/module/defender/set-mppreference"
    tags: [malware, defender, script]
    added_in: "1.0"
    action: ./engine/actions/defender/script_scanning.action.ps1
    test: ./engine/actions/defender/script_scanning.test.ps1
    undo: ./engine/actions/defender/script_scanning.undo.ps1

  - id: defender.nis
    title: "Network Inspection System (NIS)"
    description: "Inspection du trafic réseau pour bloquer les exploits connus."
    explanation: |
      NIS analyse le trafic réseau au niveau du noyau pour détecter et bloquer
      les tentatives d'exploitation de vulnérabilités connues (signatures
      Microsoft pour exploits réseau).
    severity: critical
    impact: "Aucun. Activé par défaut sur Win11."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/powershell/module/defender/set-mppreference"
    tags: [malware, defender, network]
    added_in: "1.0"
    action: ./engine/actions/defender/nis.action.ps1
    test: ./engine/actions/defender/nis.test.ps1
    undo: ./engine/actions/defender/nis.undo.ps1

  - id: defender.pua
    title: "PUA Protection (Potentially Unwanted Apps)"
    description: "Bloque l'installation des applications indésirables (toolbars, miners, ad-injectors)."
    explanation: |
      PUA Protection cible les apps qui ne sont pas malveillantes au sens strict
      mais dégradent l'expérience : barres d'outils navigateur, mineurs de
      crypto silencieux, ad-injectors, certains "optimiseurs" système.
    severity: important
    impact: "Peut bloquer certains outils gratuits considérés borderline (utilitaires de crack, certains repackagés)."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/microsoft-365/security/defender-endpoint/detect-block-potentially-unwanted-apps-microsoft-defender-antivirus"
    tags: [malware, defender, pua]
    added_in: "1.0"
    action: ./engine/actions/defender/pua.action.ps1
    test: ./engine/actions/defender/pua.test.ps1
    undo: ./engine/actions/defender/pua.undo.ps1

  - id: defender.network_protection
    title: "Network Protection"
    description: "Bloque les connexions sortantes vers domaines/IP réputés malveillants."
    explanation: |
      Network Protection intercepte les requêtes DNS et connexions sortantes
      vers les hôtes réputés malveillants (phishing, C2, exploit kits) via
      la threat intelligence Microsoft. Couche de défense complémentaire
      au DNS sécurisé.
    severity: important
    impact: "Peut bloquer occasionnellement des apps qui se connectent à des hôtes flaggés faux positif. Vérifier les blocs dans l'event viewer si une app a un comportement réseau anormal."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/microsoft-365/security/defender-endpoint/network-protection"
    tags: [malware, defender, network]
    added_in: "1.0"
    action: ./engine/actions/defender/network_protection.action.ps1
    test: ./engine/actions/defender/network_protection.test.ps1
    undo: ./engine/actions/defender/network_protection.undo.ps1

  - id: defender.controlled_folder_access
    title: "Controlled Folder Access (anti-ransomware)"
    description: "Empêche les apps non autorisées de modifier les dossiers protégés."
    explanation: |
      CFA verrouille les dossiers utilisateur (Documents, Pictures, etc.)
      et n'autorise que les apps signées Microsoft à y écrire. Bloque la
      majorité des ransomwares qui chiffrent en masse.

      ATTENTION : peut bloquer des apps légitimes non-Microsoft (Office,
      Photoshop, VSCode, Firefox profiles, OBS, etc.). Si une app ne
      peut plus sauvegarder, l'ajouter manuellement dans Windows Security
      > Virus & threat protection > Ransomware protection > Allow an app
      through Controlled folder access.
    severity: important
    impact: "Peut bloquer des apps légitimes (Office, Photoshop, VSCode, OBS, certains jeux). Liste blanche à compléter au cas par cas."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/microsoft-365/security/defender-endpoint/controlled-folders"
    tags: [malware, defender, ransomware]
    added_in: "1.0"
    action: ./engine/actions/defender/controlled_folder_access.action.ps1
    test: ./engine/actions/defender/controlled_folder_access.test.ps1
    undo: ./engine/actions/defender/controlled_folder_access.undo.ps1

  - id: defender.sample_submission
    title: "Sample submission (envoi automatique d'échantillons sûrs)"
    description: "Envoie à Microsoft les fichiers suspects qui ne contiennent pas d'info perso."
    explanation: |
      Defender peut envoyer automatiquement à Microsoft les fichiers détectés
      comme suspects pour analyse cloud, ce qui améliore la détection pour
      tous les utilisateurs. Le mode SendSafeSamples filtre les fichiers
      qui contiennent probablement de l'info perso (docs Office, PDF...) :
      ceux-là demandent un consentement explicite.

      Trade-off privacy : si une app envoie des fichiers métier suspects,
      Microsoft les voit. Le mode NeverSend bloque tout ; AlwaysPrompt
      demande à chaque fois (relou).
    severity: nice-to-have
    impact: "Léger envoi de fichiers suspects à Microsoft (mais filtré pour éviter les docs perso). Pour usage perso, c'est un bon trade-off ; pour environnement sensible (santé, finance), considérer NeverSend."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/powershell/module/defender/set-mppreference"
    tags: [defender, privacy, cloud]
    added_in: "1.0"
    action: ./engine/actions/defender/sample_submission.action.ps1
    test: ./engine/actions/defender/sample_submission.test.ps1
    undo: ./engine/actions/defender/sample_submission.undo.ps1

  - id: defender.cloud_protection
    title: "Cloud-delivered protection (HIGH)"
    description: "Active la protection cloud Defender en mode agressif."
    explanation: |
      Cloud-delivered protection envoie les hashes / metadonnees suspects à
      Microsoft Active Protection Service (MAPS) pour bénéficier de la
      télémétrie globale en quelques secondes, avant que les signatures
      locales soient à jour. Compose 3 paramètres :
        - MAPSReporting=Advanced : niveau d'envoi le plus complet
        - CloudBlockLevel=High   : bloque sur signal cloud peu sûr
        - CloudExtendedTimeout=50 : 50s d'extension pour permettre la
          réponse cloud avant de débloquer le fichier
      Crucial contre les zero-days et malwares fraîchement déployés.
    severity: critical
    impact: "Léger délai (max 50s) sur le 1er accès à un fichier inconnu. Imperceptible en usage normal."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/microsoft-365/security/defender-endpoint/cloud-protection-microsoft-defender-antivirus"
    tags: [malware, defender, cloud]
    added_in: "1.0"
    action: ./engine/actions/defender/cloud_protection.action.ps1
    test: ./engine/actions/defender/cloud_protection.test.ps1
    undo: ./engine/actions/defender/cloud_protection.undo.ps1

  - id: defender.signatures
    title: "Signatures antivirus à jour"
    description: "Force la mise à jour des signatures Defender."
    explanation: |
      Update-MpSignature télécharge les dernières signatures Defender depuis
      Windows Update. Conforme = signatures de moins de 7 jours.

      Action one-shot, idempotente : si déjà à jour, télécharge juste un
      petit delta. Pas de "undo" possible (on ne désinstalle pas une
      signature antivirus).
    severity: critical
    impact: "Quelques MB téléchargés. Aucun reboot requis."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: true
    irreversible_reason: "Update-MpSignature ne peut pas être annulé : les signatures sont des données antivirus, pas une configuration."
    references:
      - "https://learn.microsoft.com/en-us/powershell/module/defender/update-mpsignature"
    tags: [malware, defender, update]
    added_in: "1.0"
    action: ./engine/actions/defender/signatures.action.ps1
    test: ./engine/actions/defender/signatures.test.ps1

  - id: defender.tamper_protection_check
    title: "Tamper Protection (check uniquement, à activer manuellement)"
    description: "Vérifie que Tamper Protection est ON. Ne peut PAS être activé par script."
    explanation: |
      Microsoft a designed Tamper Protection pour qu'aucun script (même
      en SYSTEM) ne puisse l'activer/désactiver. Cette règle se contente
      de vérifier l'état et de signaler à l'user.

      Si non conforme : aller dans Windows Security > Virus & threat
      protection > Manage settings > Tamper Protection ON.

      L''action' de cette règle ne fait que ré-évaluer + reporter. Pas de
      modification système.
    severity: critical
    impact: "Aucun (lecture seule, plus message d'instructions)."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: true
    irreversible_reason: "Tamper Protection s'active/désactive uniquement manuellement via Windows Security UI — aucune API programmatique."
    references:
      - "https://learn.microsoft.com/en-us/microsoft-365/security/defender-endpoint/prevent-changes-to-security-settings-with-tamper-protection"
    tags: [defender, tamper-protection, manual-step]
    added_in: "1.0"
    action: ./engine/actions/defender/tamper_protection_check.action.ps1
    test: ./engine/actions/defender/tamper_protection_check.test.ps1
