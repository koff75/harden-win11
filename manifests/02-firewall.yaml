version: "1.0"

section:
  id: firewall
  order: 2
  title: "Windows Firewall"
  description: "Protection réseau au niveau OS — profils + règles spécifiques."

rules:
  - id: firewall.profile_domain
    title: "Profile Domain : enabled + block inbound"
    description: "Active le pare-feu sur le profil Domain (réseau d'entreprise AD)."
    explanation: |
      Le profil Domain s'applique quand la machine est jointe à un domaine
      Active Directory et connectée à ce réseau. Pour un PC perso non-AD,
      ce profil n'est jamais actif — la règle reste utile pour homogénéité.
    severity: critical
    impact: "Aucun pour PC perso (profil jamais actif)."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/powershell/module/netsecurity/set-netfirewallprofile"
    tags: [firewall, network]
    added_in: "1.0"
    action: ./engine/actions/firewall/profile_domain.action.ps1
    test: ./engine/actions/firewall/profile_domain.test.ps1
    undo: ./engine/actions/firewall/profile_domain.undo.ps1

  - id: firewall.profile_private
    title: "Profile Private : enabled + block inbound"
    description: "Active le pare-feu sur le profil Private (réseau domestique de confiance)."
    explanation: |
      Le profil Private s'applique sur les réseaux marqués "privés" dans
      Windows (typiquement ton Wi-Fi à la maison). Plus permissif que
      Public mais on garde le blocage entrant par défaut.
    severity: critical
    impact: "Aucun pour usage standard. Si tu hostes un service local (NAS, dev server), faudra créer une rule explicite."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/powershell/module/netsecurity/set-netfirewallprofile"
    tags: [firewall, network]
    added_in: "1.0"
    action: ./engine/actions/firewall/profile_private.action.ps1
    test: ./engine/actions/firewall/profile_private.test.ps1
    undo: ./engine/actions/firewall/profile_private.undo.ps1

  - id: firewall.profile_public
    title: "Profile Public : enabled + block inbound"
    description: "Active le pare-feu sur les réseaux publics avec blocage entrant par défaut."
    explanation: |
      Le profil Public s'applique sur Wi-Fi café, hotspots, réseaux non-fiables.
      C'est le profil le plus sensible — on bloque tout ce qui vient de
      l'extérieur (sauf règles explicites) et on laisse sortir.
    severity: critical
    impact: "Aucun pour usage standard. Si tu hostes un service local, faudra créer une rule explicite."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/powershell/module/netsecurity/set-netfirewallprofile"
    tags: [firewall, network]
    added_in: "1.0"
    action: ./engine/actions/firewall/profile_public.action.ps1
    test: ./engine/actions/firewall/profile_public.test.ps1
    undo: ./engine/actions/firewall/profile_public.undo.ps1

  - id: firewall.block_smb_public
    title: "Bloquer SMB (TCP 445) entrant sur Public"
    description: "Crée une firewall rule [Hardening] pour bloquer SMB inbound sur le profil Public."
    explanation: |
      SMB sur le port 445 est l'un des vecteurs principaux d'attaque latérale
      (EternalBlue, WannaCry). Sur un réseau public (Wi-Fi café), aucune
      raison de l'exposer. Cette règle ajoute une couche de blocage explicite
      en plus du blocage par défaut du profil Public.
    severity: critical
    impact: "Aucun en usage standard. Empêche partage de fichiers SMB sur Wi-Fi public (peu probable cas d'usage)."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/security-updates/securitybulletins/2017/ms17-010"
    tags: [firewall, smb, lateral-movement]
    added_in: "1.0"
    action: ./engine/actions/firewall/block_smb_public.action.ps1
    test: ./engine/actions/firewall/block_smb_public.test.ps1
    undo: ./engine/actions/firewall/block_smb_public.undo.ps1

  - id: firewall.block_netbios_public
    title: "Bloquer NetBIOS (UDP 137-138 + TCP 139) entrant sur Public"
    description: "Crée 2 firewall rules [Hardening] pour bloquer NetBIOS inbound sur Public."
    explanation: |
      NetBIOS over TCP/IP (ports 137 nom-resolution, 138 datagram, 139 session)
      est un protocole legacy souvent activé par défaut, exploité pour de la
      reconnaissance et du lateral movement (Responder, NTLM relay).
      Sur réseau public, aucune raison de l'exposer.
    severity: critical
    impact: "Aucun en usage standard."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://www.sans.org/blog/responder-netbios-poisoning-attacks/"
    tags: [firewall, netbios, lateral-movement]
    added_in: "1.0"
    action: ./engine/actions/firewall/block_netbios_public.action.ps1
    test: ./engine/actions/firewall/block_netbios_public.test.ps1
    undo: ./engine/actions/firewall/block_netbios_public.undo.ps1
