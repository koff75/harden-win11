version: "1.0"

section:
  id: firewall
  order: 2
  title: "Windows Firewall"
  description: "Protection réseau au niveau OS — profils + règles spécifiques."

  title_en: "Windows Firewall"
  description_en: "OS-level network protection — profiles + specific rules."
rules:
  - id: firewall.profile_domain
    title: "Profile Domain : enabled + block inbound"
    description: "Active le pare-feu sur le profil Domain (réseau d'entreprise AD)."
    explanation: |
      Le profil Domain s'applique quand la machine est jointe à un domaine
      Active Directory et connectée à ce réseau. Pour un PC perso non-AD,
      ce profil n'est jamais actif — la règle reste utile pour homogénéité.
    severity: critical
    impact: "Aucun pour PC perso (profil jamais actif)."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/powershell/module/netsecurity/set-netfirewallprofile"
    tags: [firewall, network]
    added_in: "1.0"
    user_today: "Sur un PC en entreprise (joint au domaine), le firewall peut être plus permissif."
    user_after: "On force le blocage par défaut même sur le réseau d'entreprise."
    user_for_who: "Postes en entreprise (domaine Active Directory)."
    user_risk: "Si ton admin réseau a configuré des outils qui ont besoin d'accès entrant, faudra créer des règles."
    user_today_en: "On a corporate PC (domain-joined), the firewall can be more permissive."
    user_after_en: "Forces default-deny even on the corporate network."
    user_for_who_en: "Corporate workstations (Active Directory domain)."
    user_risk_en: "If your network admin has tools that need inbound access, you'll need explicit rules."
    action: ./engine/actions/firewall/profile_domain.action.ps1
    test: ./engine/actions/firewall/profile_domain.test.ps1
    undo: ./engine/actions/firewall/profile_domain.undo.ps1
    profiles:
      - business
      - maximal

  - id: firewall.profile_private
    title: "Profile Private : enabled + block inbound"
    description: "Active le pare-feu sur le profil Private (réseau domestique de confiance)."
    explanation: |
      Le profil Private s'applique sur les réseaux marqués "privés" dans
      Windows (typiquement ton Wi-Fi à la maison). Plus permissif que
      Public mais on garde le blocage entrant par défaut.
    severity: critical
    impact: "Aucun pour usage standard. Si tu hostes un service local (NAS, dev server), faudra créer une rule explicite."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/powershell/module/netsecurity/set-netfirewallprofile"
    tags: [firewall, network]
    added_in: "1.0"

    user_today: "Sur ton réseau Wi-Fi maison (marqué 'privé'), les autres appareils peuvent se connecter à ton PC."

    user_after: "Reste accessible aux machines de ta maison mais on bloque toute tentative inhabituelle."

    user_for_who: "Tout le monde qui a un PC à la maison."

    user_risk: "Aucun pour usage normal. Si tu héberges un service local (NAS, serveur de jeu), il faudra créer une exception."

    user_today_en: "On your home Wi-Fi (marked 'private'), other devices can connect to your PC."

    user_after_en: "Stays accessible to your home machines but blocks any unusual connection attempt."

    user_for_who_en: "Everyone with a home PC."

    user_risk_en: "None for normal use. If you host a local service (NAS, game server), you'll need to add an exception."
    action: ./engine/actions/firewall/profile_private.action.ps1
    test: ./engine/actions/firewall/profile_private.test.ps1
    undo: ./engine/actions/firewall/profile_private.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: firewall.profile_public
    title: "Profile Public : enabled + block inbound"
    description: "Active le pare-feu sur les réseaux publics avec blocage entrant par défaut."
    explanation: |
      Le profil Public s'applique sur Wi-Fi café, hotspots, réseaux non-fiables.
      C'est le profil le plus sensible — on bloque tout ce qui vient de
      l'extérieur (sauf règles explicites) et on laisse sortir.
    severity: critical
    impact: "Aucun pour usage standard. Si tu hostes un service local, faudra créer une rule explicite."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/powershell/module/netsecurity/set-netfirewallprofile"
    tags: [firewall, network]
    added_in: "1.0"

    coach_example: "Tu te connectes au Wi-Fi de l'aéroport. Un autre passager scanne le réseau et trouve des partages SMB ouverts sur ta machine. Cette règle force le profil Public en \"deny inbound\" — quand Windows détecte un Wi-Fi non sûr, plus rien ne rentre. Tes shares restent invisibles."

    user_today: "Quand tu te connectes au Wi-Fi d'un café ou d'un aéroport, les autres ordinateurs du réseau peuvent essayer de te joindre."

    user_after: "Sur ces réseaux non-sûrs, ton PC devient invisible — personne ne peut s'y connecter."

    user_for_who: "Indispensable pour un laptop qui sort de la maison. Inutile sur un fixe qui ne quitte jamais ton bureau."

    user_risk: "Si tu fais du jeu en LAN ou du partage de fichiers dans un café, ça bloquera. Sinon rien."

    user_today_en: "When you connect to a café or airport Wi-Fi, other computers on the network can try to reach your PC."

    user_after_en: "On these untrusted networks, your PC becomes invisible — nobody can connect to it."

    user_for_who_en: "Essential for laptops that leave home. Useless on a desktop that never moves."

    user_risk_en: "If you do LAN gaming or file sharing in a café, it'll block. Otherwise nothing."
    action: ./engine/actions/firewall/profile_public.action.ps1
    test: ./engine/actions/firewall/profile_public.test.ps1
    undo: ./engine/actions/firewall/profile_public.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: firewall.block_smb_public
    title: "Bloquer SMB (TCP 445) entrant sur Public"
    description: "Crée une firewall rule [Hardening] pour bloquer SMB inbound sur le profil Public."
    explanation: |
      SMB sur le port 445 est l'un des vecteurs principaux d'attaque latérale
      (EternalBlue, WannaCry). Sur un réseau public (Wi-Fi café), aucune
      raison de l'exposer. Cette règle ajoute une couche de blocage explicite
      en plus du blocage par défaut du profil Public.
    severity: critical
    impact: "Aucun en usage standard. Empêche partage de fichiers SMB sur Wi-Fi public (peu probable cas d'usage)."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/security-updates/securitybulletins/2017/ms17-010"
    tags: [firewall, smb, lateral-movement]
    added_in: "1.0"

    coach_example: "Variant ciblé du Wi-Fi public : interdit explicitement le port 445 (SMB) en inbound sur le profil Public. C'est ceinture-bretelles avec firewall.profile_public — au cas où une autre rule ouvrirait par inadvertance le partage de fichiers."

    user_today: "Sur Wi-Fi public (café, aéroport), le port 445 (partage de fichiers SMB) reste potentiellement accessible aux autres machines du réseau."

    user_after: "Le port 445 est explicitement bloqué en entrée sur les réseaux Public — ceinture-bretelles si une autre rule ouvrait par erreur."

    user_for_who: "Tout le monde, surtout en mobilité."

    user_risk: "Aucun en usage standard. Empêche partage SMB sur Wi-Fi public (peu probable cas d'usage)."
    action: ./engine/actions/firewall/block_smb_public.action.ps1
    test: ./engine/actions/firewall/block_smb_public.test.ps1
    undo: ./engine/actions/firewall/block_smb_public.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: firewall.block_netbios_public
    title: "Bloquer NetBIOS (UDP 137-138 + TCP 139) entrant sur Public"
    description: "Crée 2 firewall rules [Hardening] pour bloquer NetBIOS inbound sur Public."
    explanation: |
      NetBIOS over TCP/IP (ports 137 nom-resolution, 138 datagram, 139 session)
      est un protocole legacy souvent activé par défaut, exploité pour de la
      reconnaissance et du lateral movement (Responder, NTLM relay).
      Sur réseau public, aucune raison de l'exposer.
    severity: critical
    impact: "Aucun en usage standard."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://www.sans.org/blog/responder-netbios-poisoning-attacks/"
    tags: [firewall, netbios, lateral-movement]
    added_in: "1.0"

    user_today: "Sur Wi-Fi public, les ports NetBIOS (137-139) restent potentiellement accessibles — vecteur classique d'attaque latérale."

    user_after: "Ports NetBIOS bloqués en entrée sur le profil Public."

    user_for_who: "Tout le monde, surtout en mobilité."

    user_risk: "Aucun. Si tu utilisais NetBIOS sur Wi-Fi public (jamais), il faudrait ajouter une exception."
    action: ./engine/actions/firewall/block_netbios_public.action.ps1
    test: ./engine/actions/firewall/block_netbios_public.test.ps1
    undo: ./engine/actions/firewall/block_netbios_public.undo.ps1
    profiles:
      - personal
      - business
      - maximal
