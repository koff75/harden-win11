version: "1.0"

section:
  id: privacy
  order: 6
  title: "Privacy & Telemetry"
  description: "Réduit la collecte de données et les fonctionnalités cloud (telemetry, AdID, Cortana, Recall, suggestions, ink/text)."

rules:
  - id: privacy.telemetry_required
    title: "Telemetry niveau 1 (Required only)"
    description: "AllowTelemetry = 1 — minimum acceptable sur Win11 Home."
    explanation: |
      Win11 Home n'a pas le niveau 'Security only' (0) — minimum dispo = 1
      (Required diagnostic data). Suffit pour les mises à jour critiques
      mais coupe la télémétrie 'enhanced' optionnelle.
    severity: important
    impact: "Aucun impact fonctionnel."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/windows/privacy/configure-windows-diagnostic-data-in-your-organization"
    tags: [privacy, telemetry]
    added_in: "1.0"
    user_today: "Windows envoie beaucoup d'infos à Microsoft (apps lancées, fréquence, crashs). Niveau 'Enhanced' par défaut sur Pro."
    user_after: "Niveau réduit au minimum requis (juste les crash reports critiques pour Microsoft)."
    user_for_who: "Tout le monde qui veut limiter ce qui sort de son PC vers Microsoft."
    user_risk: "Aucun fonctionnellement. Microsoft a un peu moins de signals pour améliorer Windows à l'avenir."
    user_today_en: "Windows sends a lot of info to Microsoft (apps launched, frequency, crashes). Defaults to 'Enhanced' on Pro."
    user_after_en: "Reduced to minimum required (just critical crash reports for Microsoft)."
    user_for_who_en: "Everyone who wants to limit what leaves their PC for Microsoft."
    user_risk_en: "Functionally none. Microsoft has slightly fewer signals to improve Windows in the future."
    action: ./engine/actions/privacy/telemetry_required.action.ps1
    test: ./engine/actions/privacy/telemetry_required.test.ps1
    undo: ./engine/actions/privacy/telemetry_required.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: privacy.advertising_id_machine
    title: "Advertising ID désactivé (machine-wide)"
    description: "DisabledByGroupPolicy = 1 — bloque l'Advertising ID pour tous les users."
    explanation: |
      L'Advertising ID est utilisé par les apps Store et certaines apps
      Microsoft pour cibler les pubs. Le désactiver via Group Policy
      empêche tous les users de la machine de l'utiliser.
    severity: nice-to-have
    impact: "Aucun. Les apps perdent juste leur ID de tracking."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references: []
    tags: [privacy, advertising]
    added_in: "1.0"
    action: ./engine/actions/privacy/advertising_id_machine.action.ps1
    test: ./engine/actions/privacy/advertising_id_machine.test.ps1
    undo: ./engine/actions/privacy/advertising_id_machine.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: privacy.online_speech_off
    title: "Online Speech Recognition désactivée"
    description: "AllowInputPersonalization = 0."
    explanation: |
      Empêche Win11 d'envoyer les samples vocaux au cloud Microsoft pour
      'améliorer' la reconnaissance. Reconnaissance locale toujours OK.
    severity: nice-to-have
    impact: "Aucun pour la dictée locale. Si tu utilises Cortana voice, ça casse (mais Cortana_off désactive de toute façon)."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references: []
    tags: [privacy, voice]
    added_in: "1.0"
    action: ./engine/actions/privacy/online_speech_off.action.ps1
    test: ./engine/actions/privacy/online_speech_off.test.ps1
    undo: ./engine/actions/privacy/online_speech_off.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: privacy.activity_history_off
    title: "Activity History désactivée (3 valeurs)"
    description: "EnableActivityFeed + PublishUserActivities + UploadUserActivities = 0."
    explanation: |
      Désactive Win11 Timeline et l'envoi d'historique d'activité au compte
      Microsoft cloud. Multi-value : 3 paramètres dans la même clé.
    severity: nice-to-have
    impact: "Aucun. Timeline (Win+Tab) ne montre plus l'historique."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references: []
    tags: [privacy, telemetry]
    added_in: "1.0"
    action: ./engine/actions/privacy/activity_history_off.action.ps1
    test: ./engine/actions/privacy/activity_history_off.test.ps1
    undo: ./engine/actions/privacy/activity_history_off.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: privacy.cortana_off
    title: "Cortana désactivée (AllowCortana = 0)"
    description: "Bloque Cortana (assistant Microsoft)."
    explanation: |
      Cortana envoie au cloud Microsoft une bonne partie de ce que tu tapes
      dans la barre de recherche pour 'l'améliorer'. Désactiver = recherche
      locale only.
    severity: nice-to-have
    impact: "La recherche Win11 reste OK pour les fichiers/apps locaux. Les suggestions web Bing disparaissent."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references: []
    tags: [privacy, cortana]
    added_in: "1.0"

    user_today: "Cortana est activée — assistant vocal Microsoft qui collecte tes recherches, ton calendrier, ta voix."

    user_after: "Cortana est désactivée. La barre de recherche Windows reste fonctionnelle pour les fichiers locaux."

    user_for_who: "Tout le monde qui n'utilise pas Cortana (= 99% des gens en France)."

    user_risk: "Si tu utilises Cortana pour des rappels vocaux, ne pas activer."

    user_today_en: "Cortana is enabled — Microsoft's voice assistant that collects your searches, calendar, voice."

    user_after_en: "Cortana is disabled. The Windows search bar still works for local files."

    user_for_who_en: "Everyone who doesn't use Cortana (= 99% of people)."

    user_risk_en: "If you use Cortana for voice reminders, don't enable this."
    action: ./engine/actions/privacy/cortana_off.action.ps1
    test: ./engine/actions/privacy/cortana_off.test.ps1
    undo: ./engine/actions/privacy/cortana_off.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: privacy.recall_off
    title: "Windows Recall désactivé (préventif)"
    description: "DisableAIDataAnalysis = 1."
    explanation: |
      Recall est la fonctionnalité Win11 qui screenshote ton écran toutes
      les quelques secondes pour 'l'analyser par IA'. Privacy nightmare.
      Cette règle est préventive : même si Recall n'est pas push sur ta
      machine actuellement, le set bloque son activation future.
    severity: critical
    impact: "Aucun. Recall n'est de toute façon pas utile pour 99% des users."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/windows/client-management/manage-recall"
    tags: [privacy, ai, recall]
    added_in: "1.0"

    coach_example: "Recall (Win11 24H2) prend un screenshot de ton écran toutes les quelques secondes et le stocke localement avec OCR. Pratique en théorie, désastreux en pratique : tout malware qui lit ce dossier a un historique complet de tes mots de passe, RIB, Slack privé. Cette règle désactive Recall complètement."

    user_today: "Recall (Win11 24H2) prend un screenshot de ton écran toutes les quelques secondes et stocke tout localement avec OCR."

    user_after: "Recall est complètement éteint. Plus aucune capture d'écran automatique."

    user_for_who: "Tout le monde sur Win11 24H2+."

    user_risk: "Aucun. Recall reste une fonctionnalité expérimentale, beaucoup d'utilisateurs préfèrent l'avoir off."

    user_today_en: "Recall (Win11 24H2) takes a screenshot of your screen every few seconds and stores everything locally with OCR."

    user_after_en: "Recall is fully off. No more automatic screen captures."

    user_for_who_en: "Everyone on Win11 24H2+."

    user_risk_en: "None. Recall is still experimental, many users prefer it off."
    action: ./engine/actions/privacy/recall_off.action.ps1
    test: ./engine/actions/privacy/recall_off.test.ps1
    undo: ./engine/actions/privacy/recall_off.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: privacy.consumer_features_off
    title: "Consumer features désactivées (anti-bloat machine-wide)"
    description: "DisableWindowsConsumerFeatures + DisableConsumerAccountStateContent = 1."
    explanation: |
      Empêche Win11 de pousser automatiquement des apps Store ('Suggested
      apps' dans le menu Démarrer, candidates à la réinstall après reset).
    severity: nice-to-have
    impact: "Plus de suggestions d'apps Store dans Démarrer. C'est l'effet voulu."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references: []
    tags: [privacy, bloat]
    added_in: "1.0"
    action: ./engine/actions/privacy/consumer_features_off.action.ps1
    test: ./engine/actions/privacy/consumer_features_off.test.ps1
    undo: ./engine/actions/privacy/consumer_features_off.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: privacy.silent_apps_off
    title: "HKCU : pas de réinstall silencieuse d'apps Store"
    description: "SilentInstalledAppsEnabled = 0 (user courant)."
    explanation: |
      Empêche Win11 d'installer en silence les apps 'recommandées' Microsoft
      pour ton compte user.
    severity: nice-to-have
    impact: "Aucun."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references: []
    tags: [privacy, bloat, hkcu]
    added_in: "1.0"
    action: ./engine/actions/privacy/silent_apps_off.action.ps1
    test: ./engine/actions/privacy/silent_apps_off.test.ps1
    undo: ./engine/actions/privacy/silent_apps_off.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: privacy.settings_suggestions_off
    title: "HKCU : suggestions Settings désactivées"
    description: "SubscribedContent-338389Enabled = 0."
    explanation: |
      Pas de suggestions/notifications dans l'app Settings.
    severity: nice-to-have
    impact: "Aucun."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references: []
    tags: [privacy, bloat, hkcu]
    added_in: "1.0"
    action: ./engine/actions/privacy/settings_suggestions_off.action.ps1
    test: ./engine/actions/privacy/settings_suggestions_off.test.ps1
    undo: ./engine/actions/privacy/settings_suggestions_off.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: privacy.start_suggestions_off
    title: "HKCU : suggestions menu Démarrer désactivées"
    description: "SystemPaneSuggestionsEnabled = 0."
    explanation: |
      Plus de suggestions d'apps dans le menu Démarrer.
    severity: nice-to-have
    impact: "Aucun."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references: []
    tags: [privacy, bloat, hkcu]
    added_in: "1.0"
    action: ./engine/actions/privacy/start_suggestions_off.action.ps1
    test: ./engine/actions/privacy/start_suggestions_off.test.ps1
    undo: ./engine/actions/privacy/start_suggestions_off.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: privacy.tips_welcome_off
    title: "HKCU : tips/welcome désactivés (3 SubscribedContent)"
    description: "SubscribedContent-338388/310093/353698 Enabled = 0."
    explanation: |
      Désactive les 'tips', 'Welcome experience' et autres pop-ups
      promotionnels Microsoft. Multi-value (3 SubscribedContent IDs).
    severity: nice-to-have
    impact: "Aucun. Plus de pop-ups suggéré."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references: []
    tags: [privacy, bloat, hkcu]
    added_in: "1.0"
    action: ./engine/actions/privacy/tips_welcome_off.action.ps1
    test: ./engine/actions/privacy/tips_welcome_off.test.ps1
    undo: ./engine/actions/privacy/tips_welcome_off.undo.ps1
