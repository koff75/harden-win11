      - personal
      - business
      - maximal

  - id: privacy.ink_text_collection_off
    title: "HKCU : pas de collecte ink/text implicite"
    description: "RestrictImplicitInkCollection + RestrictImplicitTextCollection = 1."
    explanation: |
      Empêche Win11 de collecter en arrière-plan ce que tu tapes/écris
      pour 'améliorer la prédiction'.
    severity: nice-to-have
    impact: "Aucun."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references: []
    tags: [privacy, telemetry, hkcu]
    added_in: "1.0"
    action: ./engine/actions/privacy/ink_text_collection_off.action.ps1
    test: ./engine/actions/privacy/ink_text_collection_off.test.ps1
    undo: ./engine/actions/privacy/ink_text_collection_off.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: privacy.advertising_id_user
    title: "HKCU : Advertising ID désactivé"
    description: "AdvertisingInfo Enabled = 0 (user courant)."
    explanation: |
      Toggle user-level de l'AdID, en complément de la policy machine-wide.
    severity: nice-to-have
    impact: "Aucun."
    requires_reboot: false
    profile_when: always
