version: "1.0"

section:
  id: system_settings
  order: 4
  title: "UAC, RDP, Power"
  description: "Renforcement UAC, désactivation RDP, et économie disque (hibernation/fast startup)."

  title_en: "UAC, RDP, Power"
  description_en: "User Account Control, Remote Desktop, hibernation — settings that make a real difference for everyday safety."
rules:
  - id: system_settings.uac_enable_lua
    title: "UAC : EnableLUA = 1"
    description: "Active globalement le filtrage LUA (base technique d'UAC)."
    explanation: |
      EnableLUA=1 est la racine d'UAC. À 0, UAC est entièrement désactivé
      et tous les processus tournent en admin sans confirmation. Crucial.
    severity: critical
    impact: "Aucun. Activé par défaut sur Win11."
    requires_reboot: true
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/windows/security/application-security/application-control/user-account-control/settings-and-configuration"
    tags: [uac, hardening]
    added_in: "1.0"
    user_today: "L'UAC (User Account Control, le mécanisme qui te demande \"voulez-vous autoriser cette app à modifier le système ?\") est peut-être désactivé."
    user_after: "L'UAC est forcé activé. Tout programme qui veut admin doit demander explicitement."
    user_for_who: "Tout le monde — c'est la barrière de base contre les malwares qui veulent s'installer."
    user_risk: "Aucun. Quelques fenêtres UAC en plus à l'install de softs."
    user_today_en: "UAC (User Account Control, the mechanism that asks 'do you want to allow this app to modify the system?') may be disabled."
    user_after_en: "UAC is forced enabled. Any program wanting admin must ask explicitly."
    user_for_who_en: "Everyone — basic barrier against malware that wants to install."
    user_risk_en: "None. A few extra UAC prompts during software installs."
    action: ./engine/actions/uac/enable_lua.action.ps1
    test: ./engine/actions/uac/enable_lua.test.ps1
    undo: ./engine/actions/uac/enable_lua.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: system_settings.uac_consent_admin
    title: "UAC : ConsentPromptBehaviorAdmin = 5"
    description: "Prompt admin sur secure desktop pour les escalades."
    explanation: |
      Valeur 5 = "Prompt for consent on the secure desktop". Le secure desktop
      est isolé du desktop user, ce qui empêche un malware en user-mode
      d'auto-cliquer le prompt UAC.
    severity: critical
    impact: "Aucun. Comportement UAC par défaut sur Win11."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/windows/security/application-security/application-control/user-account-control/settings-and-configuration"
    tags: [uac, hardening]
    added_in: "1.0"

    coach_example: "Un .exe douteux te demande des droits admin. Sans cette règle, UAC peut accepter sans demander de mot de passe (Auto-Elevate). Avec, tu dois explicitement valider la fenêtre UAC avec ton mot de passe — ça met une vraie barrière entre un drive-by-download et l'élévation de privilèges."

    user_today: "Quand un programme demande les droits administrateur, Windows peut accepter automatiquement (sans te demander)."

    user_after: "Tu dois explicitement valider chaque demande d'élévation. Un malware ne peut plus passer en silence."

    user_for_who: "Tout le monde, sauf si tu fais du dev/admin et qu'une fenêtre UAC par jour t'agace."

    user_risk: "Quelques fenêtres UAC supplémentaires en installant des logiciels. C'est l'objectif : voir ce qui demande à grimper en admin."

    user_today_en: "When a program requests admin rights, Windows can accept automatically (without asking you)."

    user_after_en: "You must explicitly approve every elevation request. Malware can no longer slip through silently."

    user_for_who_en: "Everyone, unless you do dev/admin work and one UAC popup per day annoys you."

    user_risk_en: "A few extra UAC prompts when installing software. That's the goal: see what's asking to elevate."
    action: ./engine/actions/uac/consent_admin.action.ps1
    test: ./engine/actions/uac/consent_admin.test.ps1
    undo: ./engine/actions/uac/consent_admin.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: system_settings.uac_prompt_secure_desktop
    title: "UAC : PromptOnSecureDesktop = 1"
    description: "Force tous les prompts UAC à apparaître sur le secure desktop."
    explanation: |
      Renforce ConsentPromptBehaviorAdmin en s'assurant que tous les prompts
      UAC (admin et user) passent par le secure desktop, même si une politique
      les modifie.
    severity: critical
    impact: "Aucun en usage standard."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/windows/security/application-security/application-control/user-account-control/settings-and-configuration"
    tags: [uac, hardening]
    added_in: "1.0"

    user_today: "Quand l'UAC affiche sa fenêtre, le bureau normal reste actif derrière — un malware peut tenter d'envoyer des clics auto."

    user_after: "L'UAC s'affiche sur un \"secure desktop\" isolé — aucun autre programme ne peut interagir avec lui pendant que tu décides."

    user_for_who: "Tout le monde."

    user_risk: "Très bref clignotement noir à chaque UAC. Aucun impact fonctionnel."

    user_today_en: "When UAC shows its prompt, the normal desktop stays active behind it — a malware can try to send automated clicks."

    user_after_en: "UAC displays on an isolated 'secure desktop' — no other program can interact with it while you decide."

    user_for_who_en: "Everyone."

    user_risk_en: "Very brief black flicker on each UAC. No functional impact."
    action: ./engine/actions/uac/prompt_secure_desktop.action.ps1
    test: ./engine/actions/uac/prompt_secure_desktop.test.ps1
    undo: ./engine/actions/uac/prompt_secure_desktop.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: system_settings.uac_deny_user_elevation
    title: "UAC : ConsentPromptBehaviorUser = 0 (refuser élévation user)"
    description: "Refuse silencieusement toute tentative d'élévation depuis un compte standard."
    explanation: |
      Valeur 0 = "Automatically deny elevation requests". Si un user standard
      tente une élévation, c'est refusé sans même prompt — il faut explicitement
      basculer en compte admin (Run as) pour les actions privilégiées.
    severity: important
    impact: "Si tu utilises un compte standard au quotidien, certaines actions admin nécessiteront un Run as. Pas une régression sur PC perso (compte unique = admin de toute façon)."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/windows/security/application-security/application-control/user-account-control/settings-and-configuration"
    tags: [uac, hardening]
    added_in: "1.0"

    user_today: "Un compte standard peut demander à devenir admin (en saisissant un mot de passe)."

    user_after: "Les comptes standards ne peuvent plus s'élever du tout. Faut se connecter avec le compte admin pour ça."

    user_for_who: "Setup avec plusieurs comptes (parents/enfants, famille). À éviter sur PC perso solo (= ton compte unique est admin)."

    user_risk: "Sur PC perso solo : aucun. Sur PC partagé : impossible pour les comptes standards d'installer un logiciel."

    user_today_en: "A standard account can request to become admin (by entering an admin password)."

    user_after_en: "Standard accounts can no longer elevate at all. You must log in with the admin account directly."

    user_for_who_en: "Multi-account setups (parents/kids, family). Avoid on solo personal PC (= your only account is admin)."

    user_risk_en: "On solo personal PC: none. On shared PC: standard accounts can't install software anymore."
    action: ./engine/actions/uac/deny_user_elevation.action.ps1
    test: ./engine/actions/uac/deny_user_elevation.test.ps1
    undo: ./engine/actions/uac/deny_user_elevation.undo.ps1
    profiles:
      - maximal
    breaks:
      - "Le mode Run as administrator depuis un compte standard ne fonctionne plus. Sur PC perso (compte unique = admin), aucun impact."

  - id: system_settings.rdp_disable
    title: "RDP : fDenyTSConnections = 1 (désactivation RDP)"
    description: "Refuse les connexions Remote Desktop entrantes."
    explanation: |
      RDP exposé sur Internet est l'un des vecteurs principaux de ransomware
      (BlueKeep, exposed-RDP brute force). Pour PC perso, RDP est rarement
      utilisé — on coupe.
    severity: critical
    impact: "Si tu utilises RDP pour te connecter à cette machine depuis un autre PC, ne pas appliquer."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/windows-server/remote/remote-desktop-services/clients/remote-desktop-allow-access"
    tags: [rdp, network, hardening]
    added_in: "1.0"

    coach_example: "Tu as activé RDP \"juste pour dépanner ton oncle\". 6 mois plus tard, ton port 3389 est public sur Internet et un bot tente 10 000 mots de passe par jour. Désactiver RDP ferme ce vecteur connu massivement utilisé par les ransomwares (BlueKeep, BadRabbit, etc)."

    user_today: "Le Bureau à Distance (RDP) est peut-être activé sur ton PC. Si oui, c'est une porte d'entrée connue des attaquants."

    user_after: "RDP est éteint. Plus personne ne peut se connecter à ton PC à distance via cette voie."

    user_for_who: "Tout le monde, sauf si tu utilises RDP pour dépanner ton PC depuis ailleurs."

    user_risk: "Si tu te connectes à ton PC depuis ailleurs (depuis le boulot, par exemple), tu ne pourras plus."

    user_today_en: "Remote Desktop (RDP) might be enabled on your PC. If so, it's a known entry point for attackers."

    user_after_en: "RDP is off. No one can connect to your PC remotely through this channel anymore."

    user_for_who_en: "Everyone, unless you use RDP to remote into your PC from elsewhere."

    user_risk_en: "If you remote into your PC from somewhere else (e.g., from work), you won't be able to anymore."
    action: ./engine/actions/system_settings/rdp_disable.action.ps1
    test: ./engine/actions/system_settings/rdp_disable.test.ps1
    undo: ./engine/actions/system_settings/rdp_disable.undo.ps1
    profiles:
      - personal
      - maximal
    breaks:
      - "Connexion RDP entrante (impossible de se connecter via Bureau a distance). Si tu utilises RDP pour le support distant, laisser active."

  - id: system_settings.rdp_firewall_disable
    title: "RDP : firewall rules 'Remote Desktop' désactivées"
    description: "Désactive les rules firewall du groupe Remote Desktop (defense-in-depth)."
    explanation: |
      Belt-and-suspenders avec system_settings.rdp_disable. Même si une
      politique re-active RDP côté service, les ports restent fermés
      au niveau firewall.
    severity: important
    impact: "Aucun additionnel par rapport à rdp_disable."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references: []
    tags: [rdp, firewall, defense-in-depth]
    added_in: "1.0"

    user_today: "Même si RDP service est désactivé, les règles firewall pour le port 3389 (Bureau à distance) peuvent rester ouvertes."

    user_after: "Les règles firewall RDP sont supprimées — port 3389 fermé partout."

    user_for_who: "Tout le monde qui n'utilise pas RDP. Cohérent avec rdp_disable."

    user_risk: "Si tu réactives RDP plus tard, faudra ré-ajouter les règles firewall."

    user_today_en: "Even if RDP service is disabled, firewall rules for port 3389 (Remote Desktop) may stay open."

    user_after_en: "RDP firewall rules are removed — port 3389 closed everywhere."

    user_for_who_en: "Everyone who doesn't use RDP. Consistent with rdp_disable."

    user_risk_en: "If you re-enable RDP later, you'll need to re-add the firewall rules."
    action: ./engine/actions/system_settings/rdp_firewall_disable.action.ps1
    test: ./engine/actions/system_settings/rdp_firewall_disable.test.ps1
    undo: ./engine/actions/system_settings/rdp_firewall_disable.undo.ps1
    profiles:
      - personal
      - maximal
    breaks:
      - "Idem rdp_disable : ports firewall RDP fermes."

  - id: system_settings.hibernate_off
    title: "Hibernation désactivée (libère ~RAM size sur disque)"
    description: "powercfg.exe /hibernate off — supprime hiberfil.sys."
    explanation: |
      L'hibernation Win11 stocke un dump complet de la RAM dans
      C:\\hiberfil.sys (= taille RAM, donc 8-32 GB selon la machine).
      Pour un desktop / portable plug, l'hibernation est rarement utile :
      on dort ou on shutdown.

      Bonus sécu : hiberfil.sys peut contenir des secrets (clés crypto,
      sessions) lus par un attaquant avec accès physique.
    severity: nice-to-have
    impact: "Plus d'hibernation possible (mais sleep et shutdown OK). Sur laptop, vérifier que ton flow ne dépend pas d'hibernation longue."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/windows-hardware/customize/power-settings/policies-no-hibernate"
    tags: [power, disk-space]
    added_in: "1.0"

    user_today: "Quand tu mets ton PC en veille prolongée, Windows écrit la mémoire (= secrets, mots de passe en cours) sur le disque."

    user_after: "L'hibernation est désactivée. Soit tu fais Veille (sans copie disque), soit tu éteins."

    user_for_who: "PC fixe principalement. À éviter sur laptop où l'hibernation économise la batterie."

    user_risk: "Sur laptop : tu perds l'autonomie de l'hibernation longue. Le sleep classique consomme un peu plus."

    user_today_en: "When you put your PC into hibernation, Windows writes memory contents (= secrets, passwords in use) to disk."

    user_after_en: "Hibernation is disabled. Either you Sleep (no disk copy) or shut down."

    user_for_who_en: "Mainly desktop PCs. Avoid on laptops where hibernation saves battery."

    user_risk_en: "On laptop: you lose long hibernation autonomy. Regular sleep consumes a bit more."
    action: ./engine/actions/system_settings/hibernate_off.action.ps1
    test: ./engine/actions/system_settings/hibernate_off.test.ps1
    undo: ./engine/actions/system_settings/hibernate_off.undo.ps1
    profiles:
      - business
      - maximal
    breaks:
      - "Plus d hibernation possible (sleep et shutdown OK). Sur laptop, verifier que ton flow ne depend pas d hibernation longue."

  - id: system_settings.fast_startup_off
    title: "Fast Startup désactivé (HiberbootEnabled = 0)"
    description: "Désactive le 'fast startup' Win11 (semi-hibernation kernel au shutdown)."
    explanation: |
      Fast Startup mélange hibernation + shutdown : à l'arrêt, l'état kernel
      est dumpé sur disque puis rechargé au boot (~30% plus rapide). Mais
      ça empêche les vrais shutdowns, ce qui :
        - bloque certaines mises à jour qui demandent un cold boot
        - rend les diagnostics plus durs (état kernel persistant)
        - dépend de hiberfil.sys (cf hibernate_off)
    severity: nice-to-have
    impact: "Boot ~5-10s plus lent. Plus déterministe, mises à jour OK."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/windows-hardware/design/device-experiences/powering-down"
    tags: [power, boot]
    added_in: "1.0"

    user_today: "Fast Startup (Windows 8+) garde le noyau en hibernation pour booter plus vite — mais empêche certaines mises à jour drivers et complique le forensics."

    user_after: "Fast Startup désactivé. Boot un peu plus lent (5-10s) mais shutdown propre, drivers à jour à chaque démarrage."

    user_for_who: "Profile maximal. Sur SSD moderne, la différence de boot est négligeable."

    user_risk: "Boot 5-10 secondes plus lent. Aucun autre impact."

    user_today_en: "Fast Startup (Windows 8+) keeps the kernel in hibernation for faster boot — but blocks some driver updates and complicates forensics."

    user_after_en: "Fast Startup disabled. Boot a bit slower (5-10s) but clean shutdown, drivers up to date on every start."

    user_for_who_en: "Maximal profile. On modern SSD, the boot difference is negligible."

    user_risk_en: "Boot 5-10 seconds slower. No other impact."
    action: ./engine/actions/system_settings/fast_startup_off.action.ps1
    test: ./engine/actions/system_settings/fast_startup_off.test.ps1
    undo: ./engine/actions/system_settings/fast_startup_off.undo.ps1
    profiles:
      - personal
      - business
      - maximal
