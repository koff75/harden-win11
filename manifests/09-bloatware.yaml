version: "1.0"

section:
  id: bloatware
  order: 9
  title: "Bloatware Microsoft Store"
  description: "Desinstallation des apps Store consommateurs. Tu peux selectionner individuellement celles que tu veux supprimer."

  title_en: "Microsoft Store Bloatware"
  description_en: "Removes preinstalled Store apps. You can pick individually which ones to keep."
rules:

  - id: bloatware.clipchamp
    title: "Clipchamp (editeur video Microsoft)"
    description: "Desinstalle 'Clipchamp (editeur video Microsoft)' (Appx + provisioned)."
    explanation: |
      App Store microsoft preinstallee sur Win11 (pattern Appx : *Clipchamp*).
      Cette regle desinstalle l'app pour TOUS les comptes utilisateur de la
      machine (Get-AppxPackage -AllUsers + Get-AppxProvisionedPackage).
    severity: nice-to-have
    impact: "L'app disparait. Reinstallation manuelle via Microsoft Store."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: true
    irreversible_reason: "Reinstaller une app Store desinstallee requiert le Microsoft Store + un compte Microsoft connecte. Pas une operation scriptable de facon fiable."
    references:
      - "https://learn.microsoft.com/en-us/powershell/module/appx/remove-appxpackage"
    tags: [bloatware, store, microsoft]
    added_in: "1.0"

    user_today: "L'app Clipchamp (éditeur vidéo Microsoft) est préinstallée ou installée sur ton PC. Elle prend de la place et peut tourner en arrière-plan."

    user_after: "L'app est désinstallée. Plus de notifications, plus de mises à jour, plus de processus en arrière-plan."

    user_for_who: "Ceux qui n'utilisent pas Clipchamp (éditeur vidéo Microsoft)."

    user_risk: "Si tu en as besoin plus tard, tu peux la réinstaller depuis le Microsoft Store. Aucune donnée perdue."
    action: ./engine/actions/bloatware/clipchamp.action.ps1
    test: ./engine/actions/bloatware/clipchamp.test.ps1
    profiles:
      - personal
      - business
      - maximal
