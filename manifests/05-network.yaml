version: "1.0"

section:
  id: network
  order: 5
  title: "Sécurisation des protocoles réseau"
  description: "Coupe les protocoles de résolution de nom hérités (LLMNR, mDNS, NetBIOS, WPAD) et impose NTLMv2 + signature SMB."

  title_en: "Network protocol security"
  description_en: "Cuts off legacy name-resolution protocols (LLMNR, mDNS, NetBIOS, WPAD) and enforces NTLMv2 + SMB signing."
rules:
  - id: network.llmnr_disable
    title: "Désactiver LLMNR (vieux protocole exploitable)"
    title_en: "Disable LLMNR (legacy exploitable protocol)"
    description: "Empêche la résolution de noms multicast vulnérable au poisoning."
    explanation: |
      LLMNR (UDP 5355) est un fallback de résolution de noms qui broadcast
      des requêtes sur le réseau local. Trivialement spoofable via Responder
      → vol de hashes NTLMv2 → relay/cracking. Aucune raison d'avoir ça
      activé sur Win11 moderne.
    severity: critical
    impact: "Aucun en pratique. DNS et hosts file restent OK."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://www.sans.org/blog/responder-netbios-poisoning-attacks/"
    tags: [network, llmnr, lateral-movement]
    added_in: "1.0"
    user_today: "Quand ton PC cherche un nom de machine sur le réseau, il demande à voix haute à tout le monde du réseau."
    user_after: "Il n'utilise plus que le DNS classique. Personne sur le réseau ne peut intercepter ses recherches."
    user_for_who: "Tout le monde. C'est un vecteur classique d'attaque sur Wi-Fi public."
    user_risk: "Sur un réseau familial sans DNS local correctement configuré, certaines découvertes automatiques peuvent ne plus marcher (rare)."
    user_today_en: "When your PC looks for a machine name on the network, it shouts the question to everyone on the network."
    user_after_en: "It only uses standard DNS now. Nobody on the network can intercept these lookups."
    user_for_who_en: "Everyone. Classic attack vector on public Wi-Fi."
    user_risk_en: "On a home network without correctly configured local DNS, some auto-discoveries may stop working (rare)."
    action: ./engine/actions/network/llmnr_disable.action.ps1
    test: ./engine/actions/network/llmnr_disable.test.ps1
    undo: ./engine/actions/network/llmnr_disable.undo.ps1
    profiles:
      - personal
      - maximal
    breaks:
      - "Decouverte locale par nom NetBIOS-like (rare en perso). Imprimantes anciennes peuvent ne plus etre decouvertes automatiquement en entreprise."

  - id: network.mdns_disable
    title: "Désactiver mDNS (vieux protocole local)"
    title_en: "Disable mDNS (legacy local protocol)"
    description: "Désactive mDNS Microsoft (Bonjour-like, vecteur similaire à LLMNR)."
    explanation: |
      mDNS (UDP 5353) est un autre protocole de résolution multicast,
      vulnérable au même type de poisoning que LLMNR. Win11 a son propre
      mDNS depuis 2021 — on coupe.
    severity: important
    impact: "Si tu utilises des devices Bonjour (imprimantes Apple, Chromecast en mDNS), ça peut dégrader la découverte. Pour un PC sans device IoT particulier, OK."
    requires_reboot: true
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/windows-server/security/windows-services/turn-off-mdns"
    tags: [network, mdns, lateral-movement]
    added_in: "1.0"

    user_today: "Ton PC fait de la découverte automatique style Bonjour Apple sur le réseau (cast vers TV, AirPrint, etc.)."

    user_after: "Plus de découverte automatique de ce type. Plus discret sur le réseau."

    user_for_who: "Profile 'maximal' (paranoid). À éviter chez toi si tu utilises Chromecast/AirPlay/imprimantes Apple."

    user_risk: "Plus de Chromecast, plus d'AirPrint. Si tu cast régulièrement vers une TV, ne pas l'activer."

    user_today_en: "Your PC does Apple-Bonjour-style auto-discovery on the network (cast to TV, AirPrint, etc.)."

    user_after_en: "No more such auto-discovery. More discreet on the network."

    user_for_who_en: "'Maximal' (paranoid) profile. Avoid at home if you use Chromecast/AirPlay/Apple printers."

    user_risk_en: "No more Chromecast, no more AirPrint. If you cast to a TV regularly, don't enable this."
    action: ./engine/actions/network/mdns_disable.action.ps1
    test: ./engine/actions/network/mdns_disable.test.ps1
    undo: ./engine/actions/network/mdns_disable.undo.ps1
    profiles:
      - maximal
    breaks:
      - "Chromecast, AirPrint, imprimantes via Bonjour, devices IoT en mDNS. Casse les setups entreprise avec imprimante reseau Apple/multi-fonctions."

  - id: network.netbios_off
    title: "Désactiver NetBIOS sur toutes les interfaces réseau"
    title_en: "Disable NetBIOS on all network interfaces"
    description: "Désactive NetBIOS-NS sur chaque interface (anti-Responder)."
    explanation: |
      NetBIOS Name Service (UDP 137) est l'autre vecteur principal de
      Responder, en plus de LLMNR. Cette règle agit sur 2 niveaux : WMI
      (TcpipNetbiosOptions=2 sur les adapters IP-enabled) et registre
      (NetbiosOptions=2 sur toutes les NetBT\\Interfaces).
    severity: critical
    impact: "Aucun pour l'usage moderne (DNS prend le relais). Si tu utilises encore des partages SMB par nom NetBIOS, faudra passer en FQDN/IP."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://www.sans.org/blog/responder-netbios-poisoning-attacks/"
    tags: [network, netbios, lateral-movement]
    added_in: "1.0"

    user_today: "Un vieux protocole de nommage Windows (NetBIOS) est encore activé. Souvent utilisé pour les attaques sur Wi-Fi public."

    user_after: "Désactivé. Ton PC ne répond plus aux questions NetBIOS d'un attaquant local."

    user_for_who: "Tout le monde, surtout en mobilité."

    user_risk: "Si tu accèdes à un partage réseau via un nom court (genre \\\\NAS-MAISON), il faudra utiliser l'IP ou le nom complet."

    user_today_en: "An old Windows naming protocol (NetBIOS) is still enabled. Often used in attacks on public Wi-Fi."

    user_after_en: "Disabled. Your PC no longer answers NetBIOS questions from a local attacker."

    user_for_who_en: "Everyone, especially when on the move."

    user_risk_en: "If you access a network share via short name (e.g., \\\\HOME-NAS), you'll need to use the IP or full name."
    action: ./engine/actions/network/netbios_off.action.ps1
    test: ./engine/actions/network/netbios_off.test.ps1
    undo: ./engine/actions/network/netbios_off.undo.ps1
    profiles:
      - personal
      - maximal
    breaks:
      - "Partages SMB qui passent par NetBIOS-name (NAS legacy, anciens NAS Synology/QNAP). Si tes partages utilisent FQDN ou IP, aucun impact."

  - id: network.wpad_disable
    title: "Désactiver WPAD (détection auto de proxy, exploitable)"
    title_en: "Disable WPAD (auto-proxy detection, exploitable)"
    description: "Passe le service WinHttpAutoProxySvc en Manual (ne broadcast plus en arrière-plan)."
    explanation: |
      WPAD broadcast pour découvrir un proxy auto-config. Vulnérable au
      poisoning sur réseau local (Responder/MitM). On met le service en
      Manual (Start=3) : il ne tourne plus tout seul mais peut démarrer
      à la demande si une dépendance le réclame (cas du WiFi sur certaines
      configs Win11 ARM). Disable (Start=4) cassait le WiFi sur ces
      machines — voir release notes v0.4.1.
    severity: important
    impact: "Si ton réseau utilise WPAD (rare en perso, possible en entreprise), pas appliquer."
    requires_reboot: true
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://attack.mitre.org/techniques/T1557/002/"
    tags: [network, wpad, lateral-movement]
    added_in: "1.0"

    coach_example: "WPAD (Web Proxy Auto-Discovery) cherche un serveur de proxy via DNS/NetBIOS au démarrage. Un attaquant sur ton réseau peut répondre à cette requête et devenir ton proxy → MITM sur tout ton trafic web. Désactiver WPAD ferme ce vecteur."

    user_today: "Au démarrage, ton PC cherche automatiquement un proxy web. Un attaquant local peut répondre et devenir ton intermédiaire."

    user_after: "Plus de découverte automatique de proxy. Si tu en utilises un, tu le configures explicitement."

    user_for_who: "Tout le monde, surtout en mobilité (Wi-Fi public)."

    user_risk: "Si ton entreprise utilise un proxy auto via WPAD, l'accès web peut casser (situation rare en perso)."

    user_today_en: "On startup, your PC automatically searches for a web proxy. A local attacker can answer and become your middleman."

    user_after_en: "No more auto-discovery of proxy. If you use one, you configure it explicitly."

    user_for_who_en: "Everyone, especially when mobile (public Wi-Fi)."

    user_risk_en: "If your company uses an auto WPAD proxy, web access may break (rare situation in personal use)."
    action: ./engine/actions/network/wpad_disable.action.ps1
    test: ./engine/actions/network/wpad_disable.test.ps1
    undo: ./engine/actions/network/wpad_disable.undo.ps1
    profiles:
      - personal
      - maximal
    breaks:
      - "Configuration de proxy automatique via WPAD/PAC (souvent utilise en entreprise). Si tes settings Internet utilisent un proxy auto-discovery, casse l acces web."
      - "Avant v0.4.1, mettait le service en Disabled — cassait le WiFi sur certaines machines (notamment Win11 ARM Home). Depuis v0.4.1, mis en Manual : safe."

  - id: network.ntlm_v2_only
    title: "Forcer l'authentification moderne (NTLMv2 uniquement)"
    title_en: "Force modern authentication (NTLMv2 only)"
    description: "Refuse l'auth LM/NTLMv1 (anciens, faibles). NTLMv2 only."
    explanation: |
      LmCompatibilityLevel=5 = "Send NTLMv2 response only. Refuse LM and
      NTLMv1." Casse les attaques de downgrade vers NTLMv1, qui est
      cassable en quelques heures.
    severity: critical
    impact: "Si tu utilises encore des serveurs SMB/AD très anciens (Windows Server 2003-), ça casse. Win11/Server 2019+ : aucun problème."
    requires_reboot: true
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/windows/security/threat-protection/security-policy-settings/network-security-lan-manager-authentication-level"
    tags: [network, ntlm, lateral-movement]
    added_in: "1.0"

    coach_example: "Un attaquant sur ton réseau force ton PC à parler NTLMv1 (Responder, MITM6, etc.) puis crack ton hash en quelques heures. NTLMv2 résiste mieux aux attaques de relay et au cracking offline. Cette règle force NTLMv2 only — refuse les downgrade silencieux."

    user_today: "Ton PC peut être forcé à parler une vieille version d'authentification (NTLMv1) qui se casse en quelques heures."

    user_after: "Refuse toute négociation vers une version inférieure. Reste en NTLMv2 minimum (résistant)."

    user_for_who: "Tout le monde, surtout en entreprise."

    user_risk: "Très rares vieux serveurs NTLMv1-only ne marcheront plus."

    user_today_en: "Your PC can be forced to speak an old authentication version (NTLMv1) which cracks in hours."

    user_after_en: "Refuses any downgrade negotiation. Stays at NTLMv2 minimum (resistant)."

    user_for_who_en: "Everyone, especially in corporate settings."

    user_risk_en: "Very rare NTLMv1-only old servers will stop working."
    action: ./engine/actions/network/ntlm_v2_only.action.ps1
    test: ./engine/actions/network/ntlm_v2_only.test.ps1
    undo: ./engine/actions/network/ntlm_v2_only.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: network.smb_client_signing
    title: "Partage de fichiers : signature requise (côté client)"
    title_en: "File sharing: signing required (client side)"
    description: "Force la signature des paquets SMB côté client."
    explanation: |
      Sans signature, un attaquant en MitM peut altérer les paquets SMB en
      vol. La signature SMBv2/v3 prévient les attaques type SMB relay.
    severity: critical
    impact: "Léger overhead CPU (négligeable Win11). Si tu as un serveur SMB qui ne signe pas, négo échouera."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/windows-server/storage/file-server/smb-signing-overview"
    tags: [network, smb, integrity]
    added_in: "1.0"

    user_today: "Quand tu accèdes à un partage réseau, les paquets ne sont pas signés. Quelqu'un sur le réseau pourrait les modifier."

    user_after: "Les paquets sont signés des 2 côtés. Toute altération est détectée et rejetée."

    user_for_who: "Tout le monde qui utilise des partages réseau (NAS, partages Windows)."

    user_risk: "Rare souci de compatibilité avec très vieux NAS qui ne supportent pas la signature."

    user_today_en: "When you access a network share, packets aren't signed. Someone on the network could modify them."

    user_after_en: "Packets are signed on both ends. Any tampering is detected and rejected."

    user_for_who_en: "Everyone using network shares (NAS, Windows shares)."

    user_risk_en: "Rare compatibility issue with very old NAS that don't support signing."
    action: ./engine/actions/network/smb_client_signing.action.ps1
    test: ./engine/actions/network/smb_client_signing.test.ps1
    undo: ./engine/actions/network/smb_client_signing.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: network.smb_server_signing
    title: "Partage de fichiers : signature requise (côté serveur)"
    title_en: "File sharing: signing required (server side)"
    description: "Force la signature des paquets SMB côté server."
    explanation: |
      Pareil que client_signing mais côté serveur (au cas où la machine
      partage des fichiers via SMB).
    severity: critical
    impact: "Si un client SMB n'implémente pas la signature, il ne peut plus se connecter."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/windows-server/storage/file-server/smb-signing-overview"
    tags: [network, smb, integrity]
    added_in: "1.0"

    user_today: "Si ton PC partage des fichiers, les paquets sortants ne sont pas signés."

    user_after: "Tes partages forcent la signature. Personne ne peut intercepter et modifier sans que ce soit détecté."

    user_for_who: "Tout le monde qui partage des dossiers depuis son PC."

    user_risk: "Idem que client signing : très rare souci avec vieux clients."

    user_today_en: "If your PC shares files, outgoing packets aren't signed."

    user_after_en: "Your shares enforce signing. Nobody can intercept and modify without detection."

    user_for_who_en: "Everyone who shares folders from their PC."

    user_risk_en: "Same as client signing: very rare issue with old clients."
    action: ./engine/actions/network/smb_server_signing.action.ps1
    test: ./engine/actions/network/smb_server_signing.test.ps1
    undo: ./engine/actions/network/smb_server_signing.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: network.smbv1_disable
    title: "Désactiver SMBv1 (ancien protocole, faille EternalBlue)"
    title_en: "Disable SMBv1 (legacy protocol, EternalBlue flaw)"
    description: "Set-SmbServerConfiguration + Disable-WindowsOptionalFeature SMB1Protocol."
    explanation: |
      SMBv1 est le protocole exploité par EternalBlue (WannaCry, NotPetya).
      Aucune raison de l'avoir activé en 2026. Microsoft le désactive par
      défaut depuis Win10 1709 — la règle vérifie qu'aucune politique
      tiers ne l'a réactivé.
    severity: critical
    impact: "Aucun pour un usage moderne. Si tu te connectes encore à un NAS antédiluvien en SMBv1, c'est le moment de le mettre à jour."
    requires_reboot: true
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/windows-server/storage/file-server/troubleshoot/detect-enable-and-disable-smbv1-v2-v3"
    tags: [network, smb, ransomware, eternalblue]
    added_in: "1.0"

    coach_example: "EternalBlue / WannaCry se sont propagés en 2017 via SMBv1. Cette version du protocole a 30 ans et est toujours présente sur Windows pour compat avec NAS antédiluviens. Désactiver SMBv1 ferme un vecteur d'infection latéral majeur. Si ton NAS de 2010 ne marche plus, c'est l'occasion de le remplacer."

    user_today: "Un système de partage de fichiers vieux de 30 ans est encore activé. Utilisé par les ransomwares WannaCry et NotPetya pour se répandre."

    user_after: "Ce vieux système est éteint. Ton PC ne parle plus que les versions modernes (sécurisées)."

    user_for_who: "Tout le monde, sauf si tu accèdes à un serveur ou NAS d'avant 2012 que tu ne veux pas remplacer."

    user_risk: "Si un partage réseau ne marche plus, c'est qu'il était en SMBv1. Faut mettre le NAS à jour ou faire une exception."

    user_today_en: "A 30-year-old file sharing system is still enabled. Used by WannaCry and NotPetya ransomware to spread."

    user_after_en: "This old system is off. Your PC only speaks modern (secure) versions."

    user_for_who_en: "Everyone, unless you access a server or NAS from before 2012 you don't want to replace."

    user_risk_en: "If a network share stops working, it was on SMBv1. Update the NAS or make an exception."
    action: ./engine/actions/network/smbv1_disable.action.ps1
    test: ./engine/actions/network/smbv1_disable.test.ps1
    undo: ./engine/actions/network/smbv1_disable.undo.ps1
    profiles:
      - personal
      - business
      - maximal

  - id: network.smb_guest_auth_off
    title: "Partage de fichiers : refuser l'accès invité"
    title_en: "File sharing: refuse guest access"
    description: "Empêche le client SMB d'utiliser une auth guest non chiffrée."
    explanation: |
      L'auth guest SMB est non chiffrée et permet aux attaques de phishing
      d'inciter ta machine à se connecter à un share malveillant pour voler
      des hashes. Win11 le bloque par défaut depuis 2022 mais on confirme.
    severity: important
    impact: "Si tu utilises explicitement des shares SMB en mode guest (rare), ça casse."
    requires_reboot: false
    profile_when: always
    depends_on: []
    irreversible: false
    references:
      - "https://learn.microsoft.com/en-us/troubleshoot/windows-server/networking/guest-access-in-smb2-is-disabled-by-default"
    tags: [network, smb, lateral-movement]
    added_in: "1.0"

    user_today: "Ton PC peut se connecter à des partages sans mot de passe (mode 'invité'). Un attaquant local peut faire passer un faux serveur."

    user_after: "Tout partage sans mot de passe est refusé. Faut authentification explicite."

    user_for_who: "Tout le monde."

    user_risk: "Si tu as un NAS configuré en mode invité (rare), faudra le passer en mode authentifié."

    user_today_en: "Your PC can connect to shares without password ('guest' mode). A local attacker can run a fake server."

    user_after_en: "Any password-less share is refused. Explicit authentication required."

    user_for_who_en: "Everyone."

    user_risk_en: "If you have a NAS configured in guest mode (rare), you'll need to switch it to authenticated mode."
    action: ./engine/actions/network/smb_guest_auth_off.action.ps1
    test: ./engine/actions/network/smb_guest_auth_off.test.ps1
    undo: ./engine/actions/network/smb_guest_auth_off.undo.ps1
    profiles:
      - personal
      - business
      - maximal
