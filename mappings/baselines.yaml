    anssi: []
    ms_baseline: ["TextInput/AllowLinguisticDataCollection=0"]
  privacy.advertising_id_user:
    cis: ["18.10.5.1"]
    anssi: []
    ms_baseline: ["AdvertisingID/DisabledByGroupPolicy=1"]

