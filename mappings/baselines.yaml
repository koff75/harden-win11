version: "1.0"
title: "Mapping harden-win11 → CIS / ANSSI / MS Security Baseline"
sources:
  cis: "CIS Microsoft Windows 11 Enterprise Benchmark v3.0.0 (2024)"
  anssi: "ANSSI — Recommandations de sécurité relatives à un système Microsoft Windows (PA-067, R-numbers)"
  ms_baseline: "Microsoft Security Baseline for Windows 11 24H2"
disclaimer: |
  Mapping établi à partir de la documentation publique des référentiels.
  Les correspondances sont approximatives : certaines règles harden-win11 sont plus
  strictes ou plus laxistes que la recommandation officielle. Pour un usage compliance
  (audit, certification), une revue externe est nécessaire.
  Bloatware : non couvert par CIS/ANSSI/MS (relève d'une politique d'entreprise).

mappings:
  # ─────────────────────────── DEFENDER ───────────────────────────
  defender.realtime:
    cis: ["18.10.42.12.1"]
    anssi: ["R56"]
    ms_baseline: ["DefenderAV/DisableRealtimeMonitoring=0"]
  defender.behavior_monitoring:
    cis: ["18.10.42.12.4"]
    anssi: ["R56"]
    ms_baseline: ["DefenderAV/DisableBehaviorMonitoring=0"]
  defender.ioav:
    cis: ["18.10.42.12.2"]
    anssi: ["R56"]
    ms_baseline: ["DefenderAV/DisableIOAVProtection=0"]
  defender.script_scanning:
    cis: ["18.10.42.12.5"]
    anssi: ["R56"]
    ms_baseline: ["DefenderAV/DisableScriptScanning=0"]
  defender.nis:
    cis: ["18.10.42.10.1"]
    anssi: ["R56"]
    ms_baseline: ["DefenderAV/EnableNetworkProtection"]
  defender.pua:
    cis: ["18.10.42.9"]
    anssi: ["R56"]
    ms_baseline: ["DefenderAV/PUAProtection=1"]
  defender.network_protection:
    cis: ["18.10.42.6.1.1"]
    anssi: ["R56"]
    ms_baseline: ["DefenderAV/EnableNetworkProtection=1"]
  defender.controlled_folder_access:
    cis: ["18.10.42.6.3.1"]
    anssi: []
    ms_baseline: ["DefenderAV/EnableControlledFolderAccess"]
    notes: "Pas explicite dans ANSSI. CIS conseille mais autorise Audit-only."
  defender.sample_submission:
    cis: ["18.10.42.5.1"]
    anssi: ["R55"]
    ms_baseline: ["DefenderAV/SubmitSamplesConsent"]
  defender.cloud_protection:
    cis: ["18.10.42.5.2"]
    anssi: []
    ms_baseline: ["DefenderAV/MAPSReporting"]
  defender.signatures:
    cis: ["18.10.42.7"]
    anssi: ["R57"]
    ms_baseline: ["DefenderAV/SignatureUpdateInterval"]
  defender.tamper_protection_check:
    cis: ["18.10.42.16"]
    anssi: []
    ms_baseline: ["DefenderAV/TamperProtection"]

  # ─────────────────────────── FIREWALL ───────────────────────────
  firewall.profile_domain:
    cis: ["9.1.1", "9.1.2"]
    anssi: ["R26"]
    ms_baseline: ["WindowsFirewall/DomainProfile/EnableFirewall=1"]
  firewall.profile_private:
    cis: ["9.2.1", "9.2.2"]
    anssi: ["R26"]
    ms_baseline: ["WindowsFirewall/PrivateProfile/EnableFirewall=1"]
  firewall.profile_public:
    cis: ["9.3.1", "9.3.2"]
    anssi: ["R26"]
    ms_baseline: ["WindowsFirewall/PublicProfile/EnableFirewall=1"]
  firewall.block_smb_public:
    cis: ["9.3.5"]
    anssi: ["R48"]
    ms_baseline: []
    notes: "CIS demande inbound block sur port 445 en profil Public."
  firewall.block_netbios_public:
    cis: ["9.3.5"]
    anssi: ["R47"]
    ms_baseline: []

  # ─────────────────────────── ACCOUNTS ───────────────────────────
  accounts.disable_unused:
    cis: ["2.3.1.1", "2.3.1.2", "2.3.1.6"]
    anssi: ["R7", "R8"]
    ms_baseline: ["LocalPolicies/AccountStatus/Administrator=Disabled", "LocalPolicies/AccountStatus/Guest=Disabled"]
    notes: "CIS 2.3.1.1=Administrator account status, 2.3.1.2=Block Microsoft accounts, 2.3.1.6=Guest account status."
  accounts.rename_admin:
    cis: ["2.3.1.5"]
    anssi: ["R9"]
    ms_baseline: ["LocalPolicies/SecurityOptions/RenameAdministratorAccount"]

  # ─────────────────────── SYSTEM SETTINGS / UAC / RDP ───────────────────────
  system_settings.uac_enable_lua:
    cis: ["2.3.17.1"]
    anssi: ["R20"]
    ms_baseline: ["LocalPolicies/SecurityOptions/UAC/EnableLUA=1"]
  system_settings.uac_consent_admin:
    cis: ["2.3.17.6"]
    anssi: ["R20"]
    ms_baseline: ["LocalPolicies/SecurityOptions/UAC/ConsentPromptBehaviorAdmin=2"]
  system_settings.uac_prompt_secure_desktop:
    cis: ["2.3.17.8"]
    anssi: ["R20"]
    ms_baseline: ["LocalPolicies/SecurityOptions/UAC/PromptOnSecureDesktop=1"]
  system_settings.uac_deny_user_elevation:
    cis: ["2.3.17.7"]
    anssi: ["R21"]
    ms_baseline: ["LocalPolicies/SecurityOptions/UAC/ConsentPromptBehaviorUser=0"]
  system_settings.rdp_disable:
    cis: ["18.10.56.3.2.1"]
    anssi: ["R37"]
    ms_baseline: ["RemoteDesktop/fDenyTSConnections=1"]
  system_settings.rdp_firewall_disable:
    cis: ["9.3.4"]
    anssi: ["R37"]
    ms_baseline: []
  system_settings.hibernate_off:
    cis: ["18.8.34.6.5"]
    anssi: []
    ms_baseline: []
    notes: "Pas dans baselines stricts ; recommandation pratique (sécu mémoire au sleep)."
  system_settings.fast_startup_off:
    cis: []
    anssi: []
    ms_baseline: []
    notes: "Recommandation pratique harden-win11 (cohérence reboot ↔ apply Defender). Pas dans benchmarks."

  # ─────────────────────────── NETWORK ───────────────────────────
  network.llmnr_disable:
    cis: ["18.5.13.2"]
    anssi: ["R47"]
    ms_baseline: ["DNSClient/EnableMulticast=0"]
  network.mdns_disable:
    cis: ["18.5.13.3"]
    anssi: ["R47"]
    ms_baseline: ["DNSClient/EnableMDNS=0"]
    notes: "CIS v3 ajoute mDNS (anciennement absent)."
  network.netbios_off:
    cis: ["18.5.4.1"]
    anssi: ["R47"]
    ms_baseline: ["NetBT/NetbiosOptions=2"]
  network.wpad_disable:
    cis: ["18.5.14.1"]
    anssi: ["R47"]
    ms_baseline: ["WinHttpAutoProxySvc=Disabled"]
  network.ntlm_v2_only:
    cis: ["2.3.11.7"]
    anssi: ["R31"]
    ms_baseline: ["LocalPolicies/SecurityOptions/LmCompatibilityLevel=5"]
  network.smb_client_signing:
    cis: ["2.3.8.1", "2.3.8.3"]
    anssi: ["R49"]
    ms_baseline: ["LanmanWorkstation/RequireSecuritySignature=1"]
  network.smb_server_signing:
    cis: ["2.3.9.2", "2.3.9.4"]
    anssi: ["R49"]
    ms_baseline: ["LanmanServer/RequireSecuritySignature=1"]
  network.smbv1_disable:
    cis: ["18.4.3"]
    anssi: ["R48"]
    ms_baseline: ["LanmanServer/SMB1=0"]
  network.smb_guest_auth_off:
    cis: ["18.5.8.1"]
    anssi: ["R48"]
    ms_baseline: ["LanmanWorkstation/AllowInsecureGuestAuth=0"]

  # ─────────────────────────── PRIVACY / TELEMETRY ───────────────────────────
  privacy.telemetry_required:
    cis: ["18.10.91.2.1"]
    anssi: []
    ms_baseline: ["DataCollection/AllowTelemetry=1"]
    notes: "CIS recommande Security (0) en édition Enterprise ; Required (1) sur Pro/Home."
  privacy.advertising_id_machine:
    cis: ["18.10.5.1"]
    anssi: []
    ms_baseline: ["AdvertisingID/DisabledByGroupPolicy=1"]
  privacy.online_speech_off:
    cis: ["18.10.85.1"]
    anssi: []
    ms_baseline: ["Privacy/AllowOnlineSpeechRecognition=0"]
  privacy.activity_history_off:
    cis: ["18.8.7.1.2", "18.8.7.1.3"]
    anssi: []
    ms_baseline: ["System/PublishUserActivities=0"]
  privacy.cortana_off:
    cis: ["18.10.15.1"]
    anssi: []
    ms_baseline: ["Search/AllowCortana=0"]
  privacy.recall_off:
    cis: ["18.10.93.1"]
    anssi: []
    ms_baseline: ["WindowsAI/DisableAIDataAnalysis=1"]
    notes: "Recall = nouveauté 2024, CIS v3 ajoute setting (numéro à confirmer en v3.1)."
  privacy.consumer_features_off:
    cis: ["18.9.14.1"]
    anssi: []
    ms_baseline: ["CloudContent/DisableWindowsConsumerFeatures=1"]
  privacy.silent_apps_off:
    cis: ["18.9.14.2"]
    anssi: []
    ms_baseline: ["CloudContent/DisableWindowsSpotlightFeatures=1"]
  privacy.settings_suggestions_off:
